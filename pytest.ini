[pytest]
# Pytest configuration for LinkedIn Scraper

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers for organizing tests
markers =
    integration: Integration tests that require Playwright
    unit: Unit tests without external dependencies
    slow: Slow running tests
    requires_session: Tests that require valid session file
    requires_browser: Tests that require browser availability

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage options (when using pytest-cov)
# Uncomment to enable coverage reports
# addopts = --cov=. --cov-report=html --cov-report=term-missing

# Asyncio mode for pytest-asyncio
asyncio_mode = auto

# Timeout for tests (seconds)
timeout = 300

# Minimum Python version
minversion = 3.11
